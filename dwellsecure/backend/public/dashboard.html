<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c1117" />
  <meta name="description" content="Dwell Secure admin dashboard — manage registered users." />
  <title>Dwell Secure – Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --primary-glow: rgba(14, 165, 233, 0.25);
      --bg: #0c1117;
      --bg-subtle: #111820;
      --surface: #161d28;
      --surface-elevated: #1c2532;
      --border: #27303d;
      --border-focus: #3b4a5c;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.08);
      --success: #22c55e;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.35);
      --transition: 0.2s ease;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--primary) 0%, #0369a1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--primary-glow);
    }
    .logo-mark svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }
    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo-text span { color: var(--text-muted); font-weight: 500; }
    .badge {
      background: var(--surface-elevated);
      color: var(--text-secondary);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid var(--border);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .card:focus-within { border-color: var(--border-focus); box-shadow: var(--shadow-md); }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.25rem 0;
      color: var(--text);
    }
    .card-desc {
      margin: 0 0 1.25rem 0;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }
    .form-group {
      margin-bottom: 0.5rem;
    }
    .form-row {
      display: flex;
      align-items: stretch;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      min-width: 0;
      max-width: 280px;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-subtle);
      color: var(--text);
      font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input::placeholder { color: var(--text-muted); }
    input:hover { border-color: var(--border-focus); }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    button {
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.75rem 1.35rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), transform 0.1s, box-shadow var(--transition);
    }
    button:active { transform: scale(0.98); }
    button:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--primary); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 2px 8px var(--primary-glow); }
    .btn-ghost {
      background: var(--surface-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border-focus); color: var(--text); }
    .error-msg {
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--error-bg);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9375rem;
    }
    th, td {
      text-align: left;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--surface);
    }
    th:first-child { border-radius: var(--radius-md) 0 0 0; }
    th:last-child { border-radius: 0 var(--radius-md) 0 0; }
    tbody tr { transition: background var(--transition); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.03); }
    td .user-id {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 0.8125rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .empty-state, .loading-state {
      text-align: center;
      padding: 3.5rem 1.5rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }
    .empty-state::before, .loading-state::before {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
    }
    .loading-state::before {
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .card.dashboard .card-title { margin-bottom: 0; }
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    footer a { color: var(--text-secondary); text-decoration: none; }
    footer a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="logo-text">Dwell Secure <span>· Admin</span></span>
      </div>
      <span class="badge" id="userCount">0 users</span>
    </header>

    <div id="loginCard" class="card">
      <h2 class="card-title">Admin access</h2>
      <p class="card-desc">Sign in with your admin secret to view and manage registered users.</p>
      <div class="form-group">
        <div class="form-row">
          <input type="password" id="adminSecret" placeholder="Admin secret" autocomplete="current-password" aria-label="Admin secret" />
          <button type="button" class="btn-primary" id="loginBtn">Continue</button>
        </div>
      </div>
      <p id="loginError" class="error-msg hidden" role="alert"></p>
    </div>

    <div id="dashboardCard" class="card dashboard hidden">
      <div class="toolbar">
        <button type="button" class="btn-ghost" id="refreshBtn">Refresh</button>
        <button type="button" class="btn-ghost" id="logoutBtn">Log out</button>
      </div>
      <h2 class="card-title">Registered users</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>User ID</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="4" class="loading-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <footer>
      Dwell Secure Admin Dashboard
    </footer>
  </div>

  <script>
    const ADMIN_KEY = 'dwellsecure_admin_key';
    const API_BASE = '';

    function getStoredKey() {
      return sessionStorage.getItem(ADMIN_KEY);
    }
    function setStoredKey(key) {
      sessionStorage.setItem(ADMIN_KEY, key);
    }
    function clearStoredKey() {
      sessionStorage.removeItem(ADMIN_KEY);
    }

    const loginCard = document.getElementById('loginCard');
    const dashboardCard = document.getElementById('dashboardCard');
    const adminSecretInput = document.getElementById('adminSecret');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const userTableBody = document.getElementById('userTableBody');
    const userCountBadge = document.getElementById('userCount');
    const refreshBtn = document.getElementById('refreshBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    function showError(msg) {
      loginError.textContent = msg || '';
      loginError.classList.toggle('hidden', !msg);
    }

    function switchView(showDashboard) {
      loginCard.classList.toggle('hidden', showDashboard);
      dashboardCard.classList.toggle('hidden', !showDashboard);
      if (showDashboard) dashboardCard.classList.add('fade-in');
      if (!showDashboard) showError('');
    }

    async function fetchUsers(adminKey) {
      const res = await fetch(API_BASE + '/api/admin/users', {
        headers: { 'X-Admin-Key': adminKey },
      });
      if (res.status === 401) throw new Error('Invalid admin secret');
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      return data.users || [];
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { dateStyle: 'medium' }) + ' ' + d.toLocaleTimeString(undefined, { timeStyle: 'short' });
    }

    function renderTable(users) {
      userCountBadge.textContent = users.length + ' user' + (users.length !== 1 ? 's' : '');
      if (users.length === 0) {
        userTableBody.innerHTML = '<tr><td colspan="4" class="empty-state">No users yet</td></tr>';
        return;
      }
      userTableBody.innerHTML = users.map(u => `
        <tr>
          <td>${escapeHtml(u.email)}</td>
          <td>${escapeHtml(u.name || '—')}</td>
          <td><code class="user-id">${escapeHtml(u.id)}</code></td>
          <td>${formatDate(u.createdAt)}</td>
        </tr>
      `).join('');
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadAndRender() {
      const key = getStoredKey();
      if (!key) return switchView(false);
      try {
        const users = await fetchUsers(key);
        switchView(true);
        renderTable(users);
      } catch (e) {
        clearStoredKey();
        switchView(false);
        showError(e.message || 'Invalid admin secret');
      }
    }

    adminSecretInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
    loginBtn.addEventListener('click', async () => {
      const key = (adminSecretInput.value || '').trim();
      if (!key) {
        showError('Enter the admin secret.');
        return;
      }
      showError('');
      loginBtn.disabled = true;
      try {
        const users = await fetchUsers(key);
        setStoredKey(key);
        adminSecretInput.value = '';
        switchView(true);
        renderTable(users);
      } catch (e) {
        showError(e.message || 'Invalid admin secret');
      } finally {
        loginBtn.disabled = false;
      }
    });

    refreshBtn.addEventListener('click', () => {
      userTableBody.innerHTML = '<tr><td colspan="4" class="loading-state">Loading…</td></tr>';
      loadAndRender();
    });

    logoutBtn.addEventListener('click', () => {
      clearStoredKey();
      switchView(false);
    });

    loadAndRender();
  </script>
</body>
</html>
